basePath: /
definitions:
  domain.ChoiceOption:
    properties:
      is_true:
        type: boolean
      text:
        type: string
    type: object
  domain.MatchingPair:
    properties:
      left:
        type: string
      right:
        type: string
    type: object
  domain.QuestionOptions:
    properties:
      case_sensitive:
        type: boolean
      choice:
        items:
          $ref: '#/definitions/domain.ChoiceOption'
        type: array
      correct_input:
        items:
          type: string
        type: array
      matching:
        items:
          $ref: '#/definitions/domain.MatchingPair'
        type: array
      sequence:
        items:
          $ref: '#/definitions/domain.SequenceItem'
        type: array
    type: object
  domain.SequenceItem:
    properties:
      order:
        type: integer
      text:
        type: string
    type: object
  dto.CreateEventConfigRequest:
    properties:
      event_id:
        type: integer
      extra_threshold:
        items:
          $ref: '#/definitions/dto.ExtraThresholdRequest'
        type: array
      fail_text:
        type: string
      specialization_id:
        type: integer
      success_text:
        type: string
      test_id:
        type: integer
      threshold:
        type: integer
      time_limit:
        type: integer
    type: object
  dto.CreateEventConfigResponse:
    properties:
      config_id:
        type: integer
      message:
        type: string
    type: object
  dto.CreateQuestionRequest:
    properties:
      options:
        $ref: '#/definitions/domain.QuestionOptions'
      order_number:
        type: integer
      points:
        type: integer
      text:
        type: string
      type:
        type: string
    type: object
  dto.CreateTestRequest:
    properties:
      description:
        type: string
      questions:
        items:
          $ref: '#/definitions/dto.CreateQuestionRequest'
        type: array
      title:
        type: string
    type: object
  dto.CreateTestResponse:
    properties:
      id:
        type: integer
      message:
        type: string
    type: object
  dto.CreateUserEventRequest:
    properties:
      application_id:
        type: integer
      event_id:
        type: integer
      specialization_id:
        type: integer
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      surname:
        type: string
    type: object
  dto.CreateUserResponse:
    properties:
      email:
        type: string
      message:
        type: string
      name:
        type: string
      role:
        type: string
      surname:
        type: string
      user_id:
        type: integer
    type: object
  dto.DeleteTestResponse:
    properties:
      message:
        example: Тест удален
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  dto.EventResponse:
    properties:
      end_date:
        example: "2024-12-02T00:00:00Z"
        type: string
      name:
        example: Хакатон 2024
        type: string
      specializations:
        items:
          $ref: '#/definitions/dto.EventSpecializationResponse'
        type: array
      start_date:
        example: "2024-12-01T00:00:00Z"
        type: string
      total_tests:
        example: 5
        type: integer
    type: object
  dto.EventSpecializationResponse:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: Frontend Developer
        type: string
    type: object
  dto.EventSpecializationsListResponse:
    properties:
      event_id:
        example: 1
        type: integer
      specializations:
        items:
          $ref: '#/definitions/dto.EventSpecializationResponse'
        type: array
    type: object
  dto.EventsListResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/dto.EventResponse'
        type: array
      total:
        example: 10
        type: integer
    type: object
  dto.ExtraThresholdRequest:
    properties:
      message:
        type: string
      test_id:
        type: integer
      test_threshold:
        type: integer
      threshold:
        type: integer
    type: object
  dto.FinishAttemptRequest:
    properties:
      user_answers:
        items:
          $ref: '#/definitions/dto.UserAnswerInfo'
        type: array
    type: object
  dto.FinishAttemptResponse:
    properties:
      all_completed:
        type: boolean
      max_test_points:
        type: integer
      passed:
        type: boolean
      result:
        type: string
      score:
        type: integer
    type: object
  dto.GetUsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/dto.UserInfo'
        type: array
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.LoginResponse:
    properties:
      email:
        type: string
      message:
        type: string
      name:
        type: string
      role:
        type: string
      surname:
        type: string
      token:
        type: string
      user_id:
        type: integer
    type: object
  dto.MatchingPair:
    properties:
      left:
        type: string
      right:
        type: string
    type: object
  dto.PublicMatching:
    properties:
      left:
        items:
          type: string
        type: array
      right:
        items:
          type: string
        type: array
    type: object
  dto.PublicOptions:
    properties:
      case_sensitive:
        type: boolean
      choices:
        items:
          type: string
        type: array
      matching:
        $ref: '#/definitions/dto.PublicMatching'
      sequence:
        items:
          type: string
        type: array
    type: object
  dto.QuestionPublic:
    properties:
      options:
        $ref: '#/definitions/dto.PublicOptions'
      order_number:
        type: integer
      points:
        type: integer
      question_id:
        type: integer
      text:
        type: string
      type:
        type: string
    type: object
  dto.QuestionResponse:
    properties:
      id:
        type: integer
      options:
        $ref: '#/definitions/domain.QuestionOptions'
      order_number:
        type: integer
      points:
        type: integer
      text:
        type: string
      type:
        type: string
    type: object
  dto.QuestionStatInfo:
    properties:
      is_correct:
        type: boolean
      max_points:
        type: integer
      order_number:
        type: integer
      points_earned:
        type: integer
      question_type:
        type: string
      text:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      surname:
        type: string
    type: object
  dto.RegisterResponse:
    properties:
      email:
        type: string
      message:
        type: string
      name:
        type: string
      role:
        type: string
      surname:
        type: string
      token:
        type: string
      user_id:
        type: integer
    type: object
  dto.SequenceItem:
    properties:
      order:
        type: integer
      text:
        type: string
    type: object
  dto.StartAttemptRequest:
    properties:
      application_id:
        type: integer
    type: object
  dto.StartAttemptResponse:
    properties:
      attempt_id:
        type: integer
      config_id:
        type: integer
      description:
        type: string
      questions:
        items:
          $ref: '#/definitions/dto.QuestionPublic'
        type: array
      test_id:
        type: integer
      threshold:
        type: integer
      time_limit:
        type: integer
      title:
        type: string
    type: object
  dto.StatisticsResponse:
    properties:
      attempts:
        items:
          $ref: '#/definitions/dto.UserAttemptInfo'
        type: array
    type: object
  dto.TestDetailResponse:
    properties:
      creator_id:
        type: integer
      creator_name:
        type: string
      description:
        type: string
      questions:
        items:
          $ref: '#/definitions/dto.QuestionResponse'
        type: array
      test_id:
        type: integer
      title:
        type: string
    type: object
  dto.TestInfo:
    properties:
      attempt_id:
        type: integer
      config_id:
        type: integer
      description:
        type: string
      is_common:
        type: boolean
      is_extra:
        type: boolean
      max_score:
        type: integer
      passed:
        type: boolean
      replaced_test_id:
        type: integer
      replaced_title:
        type: string
      score:
        type: integer
      status:
        description: available, locked, in_progress, completed
        type: string
      test_id:
        type: integer
      test_link:
        type: string
      time_limit:
        type: integer
      title:
        type: string
    type: object
  dto.TestResponse:
    properties:
      creator_id:
        type: integer
      creator_name:
        type: string
      description:
        type: string
      test_id:
        type: integer
      title:
        type: string
    type: object
  dto.TestSelectionResponse:
    properties:
      all_completed:
        type: boolean
      event_id:
        type: integer
      event_passed:
        type: boolean
      specialization_id:
        type: integer
      tests:
        items:
          $ref: '#/definitions/dto.TestInfo'
        type: array
    type: object
  dto.TestsListResponse:
    properties:
      tests:
        items:
          $ref: '#/definitions/dto.TestResponse'
        type: array
    type: object
  dto.UpdateEventConfigRequest:
    properties:
      event_id:
        type: integer
      extra_threshold:
        items:
          $ref: '#/definitions/dto.ExtraThresholdRequest'
        type: array
      fail_text:
        type: string
      specialization_id:
        type: integer
      success_text:
        type: string
      test_id:
        type: integer
      threshold:
        type: integer
      time_limit:
        type: integer
    type: object
  dto.UpdateEventConfigResponse:
    properties:
      config_id:
        type: integer
      message:
        type: string
    type: object
  dto.UserAnswer:
    properties:
      choices:
        items:
          type: boolean
        type: array
      matching:
        items:
          $ref: '#/definitions/dto.MatchingPair'
        type: array
      sequence:
        items:
          $ref: '#/definitions/dto.SequenceItem'
        type: array
      user_input:
        type: string
    type: object
  dto.UserAnswerInfo:
    properties:
      answer:
        $ref: '#/definitions/dto.UserAnswer'
      question_id:
        type: integer
    type: object
  dto.UserAttemptDetail:
    properties:
      attempt_id:
        type: integer
      event_name:
        type: string
      is_extra:
        type: boolean
      max_score:
        type: integer
      passed:
        type: boolean
      questions:
        items:
          $ref: '#/definitions/dto.QuestionStatInfo'
        type: array
      score:
        type: integer
      test_title:
        type: string
    type: object
  dto.UserAttemptInfo:
    properties:
      email:
        type: string
      first_name:
        type: string
      is_extra:
        type: boolean
      last_name:
        type: string
      max_score:
        type: integer
      passed:
        type: boolean
      questions:
        items:
          $ref: '#/definitions/dto.QuestionStatInfo'
        type: array
      score:
        type: integer
      time_spent_minutes:
        type: integer
      user_id:
        type: integer
    type: object
  dto.UserEventResponse:
    properties:
      application_id:
        type: integer
      event_id:
        type: integer
      id:
        type: integer
      user_id:
        type: integer
    type: object
  dto.UserEventsListResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/dto.UserEventResponse'
        type: array
    type: object
  dto.UserInfo:
    properties:
      id:
        type: integer
      name:
        type: string
      surname:
        type: string
    type: object
  dto.UserStatisticsResponse:
    properties:
      attempts:
        items:
          $ref: '#/definitions/dto.UserAttemptDetail'
        type: array
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      user_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для конструктора тестов
  title: Test Constructor API
  version: "1.0"
paths:
  /api/admin/manager/create:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя с ролью "manager" (только для админа)
      parameters:
      - description: Данные организатора
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Организатор создан
          schema:
            $ref: '#/definitions/dto.CreateUserResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Нет прав (не админ)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Пользователь уже существует
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать организатора
      tags:
      - admin
  /api/intern/attempt/active:
    get:
      description: Возвращает данные текущей незавершённой попытки пользователя
      produces:
      - application/json
      responses:
        "200":
          description: Активная попытка
          schema:
            $ref: '#/definitions/dto.StartAttemptResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Нет активной попытки
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить активную попытку
      tags:
      - attempts
  /api/intern/attempt/finish:
    post:
      consumes:
      - application/json
      description: Проверяет ответы пользователя и завершает активную попытку
      parameters:
      - description: Ответы пользователя
        in: body
        name: answers
        required: true
        schema:
          $ref: '#/definitions/dto.FinishAttemptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Результаты проверки
          schema:
            $ref: '#/definitions/dto.FinishAttemptResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Активная попытка не найдена
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Завершить тест
      tags:
      - attempts
  /api/intern/tests/{link}:
    get:
      consumes:
      - application/json
      description: Создаёт новую попытку прохождения теста по ссылке конфигурации
      parameters:
      - description: Ссылка конфигурации теста (UUID)
        in: path
        name: link
        required: true
        type: string
      - description: Данные для начала попытки
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.StartAttemptRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Попытка создана
          schema:
            $ref: '#/definitions/dto.StartAttemptResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Нет доступа к тесту
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Тест не найден
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Уже есть активная попытка или тест пройден
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Начать тест
      tags:
      - attempts
  /api/intern/tests/selection:
    get:
      description: Возвращает список доступных тестов для мероприятия с учётом замен
      parameters:
      - description: Event ID
        in: query
        name: event_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список тестов
          schema:
            $ref: '#/definitions/dto.TestSelectionResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Пользователь не записан на мероприятие
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список тестов
      tags:
      - attempts
  /api/intern/users/events:
    get:
      description: Возвращает список мероприятий, на которые записан пользователь
      produces:
      - application/json
      responses:
        "200":
          description: Список мероприятий
          schema:
            $ref: '#/definitions/dto.UserEventsListResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить мероприятия пользователя
      tags:
      - user-events
    post:
      consumes:
      - application/json
      description: Создает связь между пользователем и мероприятием
      parameters:
      - description: Данные мероприятия
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Уже записан
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Записаться на мероприятие
      tags:
      - user-events
  /api/manager/events:
    get:
      description: Получает список всех мероприятий из CRM
      produces:
      - application/json
      responses:
        "200":
          description: Список мероприятий
          schema:
            $ref: '#/definitions/dto.EventsListResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Ошибка сервера
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить мероприятия
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Создает новую конфигурацию тестирования для мероприятия
      parameters:
      - description: Конфигурация
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/dto.CreateEventConfigRequest'
      - description: Specialization ID (0 = общий тест)
        in: body
        name: specialization_id
        schema:
          type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Конфигурация создана
          schema:
            $ref: '#/definitions/dto.CreateEventConfigResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать конфигурацию мероприятия
      tags:
      - events
  /api/manager/events/{id}:
    put:
      consumes:
      - application/json
      description: Обновляет существующую конфигурацию мероприятия
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      - description: Обновленная конфигурация
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateEventConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Конфигурация обновлена
          schema:
            $ref: '#/definitions/dto.UpdateEventConfigResponse'
        "400":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Нет прав
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Не найдена
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить конфигурацию
      tags:
      - events
  /api/manager/events/{id}/specializations:
    get:
      description: Получает список специализаций конкретного мероприятия из CRM
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список специализаций
          schema:
            $ref: '#/definitions/dto.EventSpecializationsListResponse'
        "400":
          description: Неверный ID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Мероприятие не найдено
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить специализации мероприятия
      tags:
      - events
  /api/manager/events/{id}/statistics:
    get:
      consumes:
      - application/json
      description: Получить статистику всех попыток по мероприятию
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      - description: Фильтр по дополнительным тестам
        in: body
        name: is_extra
        schema:
          type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Статистика мероприятия
          schema:
            $ref: '#/definitions/dto.StatisticsResponse'
        "400":
          description: Неверный ID
